<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenPark Butchery Orders</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00a651">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: url('https://i.ibb.co/B5mVfM7X/images-14.jpg') center/cover no-repeat fixed;
      min-height: 100vh;
      color: white;
    }

    .overlay {
      background: rgba(0,0,0,0.75);
      min-height: 100vh;
      padding: 20px;
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    input, select {
      background: white;
      color: black;
    }

    button {
      background: #00a651;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #008f45;
    }

    .admin-btn {
      background: #ff9800;
    }

    .paid {
      border-left: 6px solid lime;
    }

    .pending {
      border-left: 6px solid red;
    }

    .hidden {
      display: none;
    }

    .order-box {
      background: rgba(255,255,255,0.15);
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
    }

    .price-list {
      margin-top: 10px;
      line-height: 1.9;
    }

    .status {
      padding: 5px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }

    .status.pending {
      background: darkred;
      border-left: none;
    }

    .status.paid {
      background: green;
      border-left: none;
    }

    audio {
      display: none;
    }
  </style>
</head>
<body>

<div class="overlay">
  <div class="container">

    <div class="topbar">
      <div class="logo" ondblclick="showAdminLogin()">
        <img src="https://i.ibb.co/B5P2bsDv/raw-pork-leg-sticker-white-background-1308-64489.jpg" alt="logo">
        <div>
          <h1>GreenPark Butchery</h1>
<p>Fresh Meat Orders</p>
        </div>
      </div>

     
    </div>

    <!-- CUSTOMER ORDER SECTION -->
    <div class="card">
      <h2>Place Order</h2>

<input type="text" id="customerName" placeholder="Enter your name" required>

<input type="tel" id="customerPhone" placeholder="Enter phone number" required>

<select id="pickupTime" required>
  <option value="">Select pickup time</option>
  <option>7:00 AM</option>
  <option>8:00 AM</option>
  <option>9:00 AM</option>
  <option>10:00 AM</option>
  <option>11:00 AM</option>
  <option>12:00 PM</option>
  <option>1:00 PM</option>
  <option>2:00 PM</option>
  <option>3:00 PM</option>
  <option>4:00 PM</option>
  <option>5:00 PM</option>
  <option>6:00 PM</option>
</select>
<select id="meatType" required>
  <option value="">Select meat preparation</option>
  <option value="Choma">Choma</option>
  <option value="Boil">Boil</option>
  <option value="Fry">Fry</option>
</select>

      <select id="orderType">
        <option value="Quarter">Quarter</option>
        <option value="Half">Half</option>
        <option value="Three Quarters">Three Quarters</option>
        <option value="Full">Full</option>
      </select>

      <div class="price-list">
        <p>Quarter: KES <span id="quarterPrice">0</span></p>
        <p>Half: KES <span id="halfPrice">0</span></p>
        <p>Three Quarters: KES <span id="threeQuarterPrice">0</span></p>
        <p>Full: KES <span id="fullPrice">0</span></p>
      </div>

      <button onclick="placeOrder()">Submit Order</button>
    </div>

    <!-- ADMIN LOGIN -->
    <div class="card hidden" id="adminLoginBox">
      <h2>Admin Login</h2>
      <input type="password" id="adminPassword" placeholder="Enter admin password">
      <button onclick="loginAdmin()">Login</button>
    </div>

    <!-- ADMIN PANEL -->
    <div class="card hidden" id="adminPanel">
      <h2>Admin Panel</h2>

      <h3>Set Prices</h3>

      <input type="number" id="setQuarter" placeholder="Quarter Price">
      <input type="number" id="setHalf" placeholder="Half Price">
      <input type="number" id="setThreeQuarter" placeholder="Three Quarter Price">
      <input type="number" id="setFull" placeholder="Full Price">

      <button onclick="savePrices()">Save Prices</button>

      <hr style="margin:20px 0;">

      <h3>Customer Orders</h3>
      <div id="ordersContainer"></div>
    </div>

  </div>
</div>

<!-- Notification Sound -->
<audio id="notificationSound">
  <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>

<!-- Firebase -->
<script type="module">

  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

  import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp,
    onSnapshot,
    doc,
    updateDoc,
    setDoc,
    getDoc
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // ==========================
  // YOUR FIREBASE CONFIG
  // ==========================

  const firebaseConfig = {
    apiKey: "AIzaSyBkAoRR7WEs9HTcsmFc8J-pwf5ypKhz-Lo",
    authDomain: "butcherydenis.firebaseapp.com",
    projectId: "butcherydenis",
    storageBucket: "butcherydenis.firebasestorage.app",
    messagingSenderId: "563340778466",
    appId: "1:563340778466:web:68d0bfc561ab65b72cb7bb"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ==========================
  // ADMIN PASSWORD
  // ==========================

  const ADMIN_PASSWORD = "greenpark123";

  const notificationSound = document.getElementById('notificationSound');

  // ==========================
  // LOAD PRICES
  // ==========================

  async function loadPrices() {
    const docRef = doc(db, 'settings', 'prices');
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();

      document.getElementById('quarterPrice').innerText = data.quarter || 0;
      document.getElementById('halfPrice').innerText = data.half || 0;
      document.getElementById('threeQuarterPrice').innerText = data.threeQuarter || 0;
      document.getElementById('fullPrice').innerText = data.full || 0;

      document.getElementById('setQuarter').value = data.quarter || 0;
      document.getElementById('setHalf').value = data.half || 0;
      document.getElementById('setThreeQuarter').value = data.threeQuarter || 0;
      document.getElementById('setFull').value = data.full || 0;
    }
  }

  loadPrices();

  // ==========================
  // PLACE ORDER
  // ==========================

  window.placeOrder = async function() {

    const customerName = document.getElementById('customerName').value.trim();
const customerPhone = document.getElementById('customerPhone').value.trim();
const pickupTime = document.getElementById('pickupTime').value;
const meatType = document.getElementById('meatType').value;
const orderType = document.getElementById('orderType').value;

if (!customerName || !customerPhone || !pickupTime || !meatType) {
  alert('Please fill all fields');
  return;
}

    let amount = 0;

    if (orderType === 'Quarter') {
      amount = document.getElementById('quarterPrice').innerText;
    }

    if (orderType === 'Half') {
      amount = document.getElementById('halfPrice').innerText;
    }

    if (orderType === 'Three Quarters') {
      amount = document.getElementById('threeQuarterPrice').innerText;
    }

    if (orderType === 'Full') {
      amount = document.getElementById('fullPrice').innerText;
    }

    await addDoc(collection(db, 'orders'), {
  customerName,
  customerPhone,
  pickupTime,
  meatType,
  orderType,
  amount,
  status: 'Pending',
  createdAt: serverTimestamp()
});

    alert('Order placed successfully');

    document.getElementById('customerName').value = '';
  }

  // ==========================
  // ADMIN LOGIN
  // ==========================

  window.showAdminLogin = function() {
    document.getElementById('adminLoginBox').classList.remove('hidden');
  }

  window.loginAdmin = function() {
    const password = document.getElementById('adminPassword').value;

    if (password === ADMIN_PASSWORD) {
      document.getElementById('adminPanel').classList.remove('hidden');
      document.getElementById('adminLoginBox').classList.add('hidden');
      listenForOrders();
    } else {
      alert('Wrong password');
    }
  }

  // ==========================
  // SAVE PRICES
  // ==========================

  window.savePrices = async function() {

    const quarter = document.getElementById('setQuarter').value;
    const half = document.getElementById('setHalf').value;
    const threeQuarter = document.getElementById('setThreeQuarter').value;
    const full = document.getElementById('setFull').value;

    await setDoc(doc(db, 'settings', 'prices'), {
      quarter,
      half,
      threeQuarter,
      full
    });

    alert('Prices updated');
    loadPrices();
  }

  // ==========================
  // LISTEN FOR ORDERS
  // ==========================

  let firstLoad = true;

  function listenForOrders() {

    const ordersContainer = document.getElementById('ordersContainer');

    onSnapshot(collection(db, 'orders'), (snapshot) => {

      ordersContainer.innerHTML = '';

      if (!firstLoad) {
        notificationSound.play();
      }

      firstLoad = false;

      snapshot.forEach((docSnap) => {

        const data = docSnap.data();

        const orderDiv = document.createElement('div');

        orderDiv.className = `order-box ${data.status === 'Paid' ? 'paid' : 'pending'}`;

        orderDiv.innerHTML = `
          <h3>${data.customerName}</h3>
          <p><strong>Order:</strong> ${data.orderType}</p>
<p><strong>Phone:</strong> ${data.customerPhone}</p>
<p><strong>Preparation:</strong> ${data.meatType}</p>
<p><strong>Pickup Time:</strong> ${data.pickupTime}</p>
          <p><strong>Amount:</strong> KES ${data.amount}</p>
          <p><strong>Booking Time:</strong> ${data.createdAt?.toDate ? data.createdAt.toDate().toLocaleString() : 'Loading...'}</p>

          <div class="status ${data.status === 'Paid' ? 'paid' : 'pending'}">
            ${data.status}
          </div>

          ${data.status === 'Pending'
            ? `<button onclick="markPaid('${docSnap.id}')">Mark as Paid</button>`
            : ''}
        `;

        ordersContainer.prepend(orderDiv);
      });
    });
  }

  // ==========================
  // MARK PAID
  // ==========================

  window.markPaid = async function(id) {

    const orderRef = doc(db, 'orders', id);

    await updateDoc(orderRef, {
      status: 'Paid'
    });
  }

</script>

</body>
  </html>
